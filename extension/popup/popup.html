<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nightstand</title>
    <style>
      body {
        width: 340px;
        margin: 0;
        padding: 14px;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      .page-url {
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        font-size: 12px;
        color: #111827;
        word-break: break-all;
        line-height: 1.5;
      }
      .actions {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      button {
        padding: 6px 14px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        background: #111827;
        color: #f9fafb;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .status {
        font-size: 12px;
      }
      .status-ok {
        color: #059669;
      }
      .status-duplicate {
        color: #4b5563;
      }
      .status-error {
        color: #b91c1c;
      }
      .config-hint {
        margin-top: 10px;
        font-size: 12px;
        color: #4b5563;
      }
      .link {
        color: #111827;
        font-weight: 500;
        text-decoration: underline;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Save to Reading List</h1>
    <div id="config-hint" class="config-hint" hidden>
      API not configured. Open
      <span id="open-options" class="link">options</span>
      to set the API URL and key.
    </div>
    <div id="page-url" class="page-url"></div>
    <div class="actions">
      <button id="save-btn" disabled>Save</button>
      <span id="status" class="status"></span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
