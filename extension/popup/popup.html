<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nightstand</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body {
        width: 280px;
        min-height: 80px;
        margin: 0;
        padding: 0;
        display: flex;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        background: transparent;
        color: #111827;
      }

      /* ── Views ─────────────────────────────────── */
      .view {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px 16px;
        min-height: 80px;
        background: transparent;
      }
      .view.active {
        display: flex;
      }

      /* ── Login view: opaque so user can see the form ─────────────────────────────── */
      #view-login {
        flex-direction: column;
        gap: 8px;
        background: #f9fafb;
        border-radius: 8px;
      }
      #view-login p {
        font-size: 13px;
        font-weight: 600;
        color: #374151;
      }
      #sign-in-btn {
        padding: 7px 18px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        background: #111827;
        color: #f9fafb;
      }
      #sign-in-btn:disabled {
        opacity: 0.6;
        cursor: default;
      }

      /* ── Loading view: transparent so no white flash before toast on page ───────── */
      #view-loading {
        gap: 8px;
        background: transparent;
      }
      #view-loading .spinner,
      #view-loading span {
        opacity: 0;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid #d1d5db;
        border-top-color: #111827;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      #view-loading span {
        font-size: 13px;
        color: #6b7280;
      }

      /* ── Result views ───────────────────────────── */
      .result-icon {
        font-size: 20px;
        line-height: 1;
        flex-shrink: 0;
      }
      .result-label {
        font-size: 13px;
        font-weight: 600;
      }
      /* Success toast: pill, 32px from right, 24px from top, enter/exit from left */
      #view-success {
        display: none;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 6px;
        min-height: auto;
        border-radius: 9999px;
        background: #212121;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.25);
        align-self: flex-start;
        margin-top: 24px;
        margin-right: 32px;
        margin-left: auto;
      }
      #view-success.active { display: flex; }
      #view-success.toast-enter {
        animation: toast-enter 300ms ease-out forwards;
      }
      #view-success.toast-exit {
        animation: toast-exit 300ms ease-in forwards;
      }
      @keyframes toast-enter {
        from { opacity: 0; transform: translate(-40px, 0); }
        to { opacity: 1; transform: translate(0, 0); }
      }
      @keyframes toast-exit {
        from { opacity: 1; transform: translate(0, 0); }
        to { opacity: 0; transform: translate(-40px, 0); }
      }
      #view-success .toast-check {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        color: #00CA48;
        stroke-width: 1.5;
      }
      #view-success .result-label {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        line-height: 120%;
        letter-spacing: -0.1px;
        color: #EDEDED;
      }
      /* Duplicate toast: same as success (32px right, 24px top, enter/exit from left) */
      #view-duplicate {
        display: none;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 6px;
        min-height: auto;
        border-radius: 9999px;
        background: #212121;
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.25);
        align-self: flex-start;
        margin-top: 24px;
        margin-right: 32px;
        margin-left: auto;
      }
      #view-duplicate.active { display: flex; }
      #view-duplicate.toast-enter {
        animation: toast-enter 300ms ease-out forwards;
      }
      #view-duplicate.toast-exit {
        animation: toast-exit 300ms ease-in forwards;
      }
      #view-duplicate .toast-check {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        color: #00CA48;
      }
      #view-duplicate .result-label {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 13px;
        font-weight: 600;
        line-height: 120%;
        letter-spacing: -0.1px;
        color: #EDEDED;
      }
      #view-error .result-icon { color: #b91c1c; }
      #view-error {
        flex-direction: column;
        gap: 4px;
        background: #f9fafb;
        border-radius: 8px;
      }
      #view-error .result-label { color: #991b1b; }
      #error-text {
        font-size: 11px;
        color: #6b7280;
        text-align: center;
        max-width: 220px;
      }
    </style>
  </head>
  <body>
    <!-- Login -->
    <div id="view-login" class="view">
      <p>Save to Nightstand</p>
      <button id="sign-in-btn">Sign in with Google</button>
    </div>

    <!-- Loading / saving -->
    <div id="view-loading" class="view">
      <div class="spinner"></div>
      <span>Saving…</span>
    </div>

    <!-- Success (toast: pill, Lucide-style check 16×16 #00CA48, 6px padding, 4px gap) -->
    <div id="view-success" class="view">
      <svg class="toast-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
      <span class="result-label">Saved</span>
    </div>

    <!-- Duplicate (same toast as success: dark pill, green check, enter/exit from top-right) -->
    <div id="view-duplicate" class="view">
      <svg class="toast-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
      <span class="result-label">Already saved</span>
    </div>

    <!-- Error (stays open so user can read it) -->
    <div id="view-error" class="view">
      <span class="result-icon">✗</span>
      <span class="result-label">Could not save</span>
      <span id="error-text"></span>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
