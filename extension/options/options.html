<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>X Article Curator – Options</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          sans-serif;
        margin: 16px;
        color: #111827;
      }
      .field {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 6px 8px;
        font-size: 13px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        box-sizing: border-box;
      }
      button {
        margin-top: 8px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 500;
        border-radius: 999px;
        border: none;
        background: #111827;
        color: #f9fafb;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .status {
        margin-top: 8px;
        font-size: 12px;
        color: #059669;
      }
    </style>
  </head>
  <body>
    <h1>X Article Curator – Options</h1>
    <p style="font-size: 13px; color: #4b5563; margin-bottom: 16px">
      Configure the API endpoint and secret key used to save articles.
    </p>
    <div class="field">
      <label for="api-url">API URL</label>
      <input
        id="api-url"
        type="url"
        placeholder="https://localhost:3000"
        autocomplete="off"
      />
    </div>
    <div class="field">
      <label for="api-key">API secret key</label>
      <input
        id="api-key"
        type="text"
        placeholder="dev-change-me"
        autocomplete="off"
      />
    </div>
    <button id="save">Save</button>
    <div id="status" class="status" aria-live="polite"></div>
    <script src="options.js"></script>
  </body>
</html>
